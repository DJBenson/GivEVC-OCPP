set_charging_schedule:
  name: Set charging schedule
  description: >
    Set a recurring charging schedule on the charger. All existing schedules are
    replaced. Omit 'days' (or select all seven) for a daily schedule; select a
    subset of days for a weekly schedule.
  fields:
    entry_id:
      required: false
      selector:
        text:
    days:
      name: Days
      description: Days the schedule applies to. Leave empty for every day.
      required: false
      default: []
      example: ["mon", "wed", "fri"]
      selector:
        select:
          multiple: true
          options:
            - value: mon
              label: Monday
            - value: tue
              label: Tuesday
            - value: wed
              label: Wednesday
            - value: thu
              label: Thursday
            - value: fri
              label: Friday
            - value: sat
              label: Saturday
            - value: sun
              label: Sunday
    start:
      name: Start time
      description: Start of the charging window (local time).
      required: true
      default: "00:00"
      example: "23:00"
      selector:
        time:
    end:
      name: End time
      description: End of the charging window (local time). May be earlier than start for overnight windows.
      required: true
      default: "07:00"
      example: "07:00"
      selector:
        time:
    limit_a:
      name: Charge limit (A)
      description: Maximum charge current in amps during the window.
      required: true
      default: 32
      example: 16
      selector:
        number:
          min: 6
          max: 32
          step: 1
          unit_of_measurement: A
    show_ocpp_output:
      name: Show OCPP output
      description: Return the OCPP SetChargingProfile payload sent to the charger.
      required: false
      default: false
      selector:
        boolean:
clear_charging_schedule:
  name: Clear charging schedule
  description: Remove the active charging schedule from the charger.
  fields:
    entry_id:
      required: false
      selector:
        text:
add_rfid_tag:
  name: Add RFID tag
  description: Add or update an RFID tag on the charger's local authorisation list.
  fields:
    entry_id:
      required: false
      selector:
        text:
    id_tag:
      name: Tag ID
      description: The RFID tag identifier (as read by the charger).
      required: true
      example: "1234ABCD"
      selector:
        text:
    expiry_date:
      name: Expiry date
      description: Optional expiry date/time in ISO 8601 format. Leave blank for no expiry.
      required: false
      example: "2026-12-31T00:00:00Z"
      selector:
        text:
remove_rfid_tag:
  name: Remove RFID tag
  description: Remove an RFID tag from the charger's local authorisation list.
  fields:
    entry_id:
      required: false
      selector:
        text:
    id_tag:
      name: Tag ID
      description: The RFID tag identifier to remove.
      required: true
      example: "1234ABCD"
      selector:
        text:
reset:
  name: Reset charger
  description: Send a soft or hard OCPP Reset command to the connected charger.
  fields:
    entry_id:
      required: false
      selector:
        text:
    type:
      required: true
      selector:
        select:
          options:
            - Soft
            - Hard
unlock_connector:
  name: Unlock connector
  description: Send an OCPP UnlockConnector request to release the connector lock.
  fields:
    entry_id:
      required: false
      selector:
        text:
    connector_id:
      required: false
      default: 1
      selector:
        number:
          min: 1
          max: 10
trigger_message:
  name: Trigger message
  description: Ask the charger to send a specific OCPP message, such as MeterValues.
  fields:
    entry_id:
      required: false
      selector:
        text:
    requested_message:
      required: true
      selector:
        text:
    connector_id:
      required: false
      selector:
        number:
          min: 0
          max: 10
get_configuration:
  name: Refresh configuration
  description: Request the charger's full OCPP configuration set and optionally return the raw OCPP response payload.
  fields:
    entry_id:
      required: false
      selector:
        text:
    keys:
      required: false
      selector:
        object:
change_configuration:
  name: Change configuration
  description: Send a ChangeConfiguration request to the charger.
  fields:
    entry_id:
      required: false
      selector:
        text:
    key:
      required: true
      selector:
        text:
    value:
      required: true
      selector:
        text:
remote_start_transaction:
  name: Remote start transaction
  description: Start charging remotely using OCPP RemoteStartTransaction.
  fields:
    entry_id:
      required: false
      selector:
        text:
    id_tag:
      required: false
      selector:
        text:
    connector_id:
      required: false
      selector:
        number:
          min: 1
          max: 10
    charging_profile:
      required: false
      selector:
        object:
remote_stop_transaction:
  name: Remote stop transaction
  description: Stop charging remotely using OCPP RemoteStopTransaction.
  fields:
    entry_id:
      required: false
      selector:
        text:
    transaction_id:
      required: false
      selector:
        number:
          min: 1
          max: 2147483647
set_charging_profile:
  name: Set charging profile
  description: Send a raw SetChargingProfile OCPP request.
  fields:
    entry_id:
      required: false
      selector:
        text:
    connector_id:
      required: true
      selector:
        number:
          min: 1
          max: 10
    charging_profile:
      required: true
      selector:
        object:
clear_charging_profile:
  name: Clear charging profile
  description: Clear one or more charging profiles from the charger.
  fields:
    entry_id:
      required: false
      selector:
        text:
    connector_id:
      required: false
      selector:
        number:
          min: 0
          max: 10
    charging_profile_id:
      required: false
      selector:
        number:
          min: 1
          max: 2147483647
    stack_level:
      required: false
      selector:
        number:
          min: 0
          max: 100
    charging_profile_purpose:
      required: false
      selector:
        text:
change_availability:
  name: Change availability
  description: Toggle the charger between operative and inoperative.
  fields:
    entry_id:
      required: false
      selector:
        text:
    operative:
      required: true
      selector:
        boolean:
update_firmware:
  name: Update firmware
  description: Send an OCPP UpdateFirmware request to the charger.
  fields:
    entry_id:
      required: false
      selector:
        text:
    location:
      required: true
      selector:
        text:
    retrieve_date:
      required: true
      selector:
        text:
    retries:
      required: false
      selector:
        number:
          min: 0
          max: 100
    retry_interval:
      required: false
      selector:
        number:
          min: 0
          max: 86400
